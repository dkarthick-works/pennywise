services:
  db:
    image: postgres:16-alpine
    container_name: ledger-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ledger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ledger}
    volumes:
      - /data/pennywise-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ledger} -d ${POSTGRES_DB:-ledger}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ledger-app
    env_file: .env
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER:-ledger}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ledger}?sslmode=disable"
    ports:
      - "8084:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
